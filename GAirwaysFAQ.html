    <script>
        $(document).ready(function () {
            widgetRun();
            renewIDToken();
            
            n = new Date();
            y = n.getFullYear();
            m = n.getMonth() + 1;
            d = n.getDate();
            if (d > 21) {
                m = m + 1;
                d = d - 20;
            }

            if (localStorage.getItem("FlightBooked") == 1) {
                if (localStorage.getItem("email") == null) {

                }
                else {
                    document.getElementById('flightNumberLabel').innerHTML = "Flight Number: ";
                    document.getElementById('flightNumber').innerHTML = "GA8271";
                    document.getElementById("flightDateLabel").innerHTML = m + "/" + (d + 2) + "/" + y + " - " + m + "/" + (d + 9) + "/" + y;
                    document.getElementById('toflightTime').innerHTML = "11:15am - 2:40pm";
                    document.getElementById('fromflightTime').innerHTML = "9:45am - 1:15pm";
                    document.getElementById('toDestinationLabel').innerHTML = "Departure to Destination: ";
                    document.getElementById('fromDestinationLabel').innerHTML = "Departure From Destination: ";

                    const toDestinationStorage = localStorage.getItem("toDestination");
                    const fromDestinationStorage = localStorage.getItem("fromDestination");

                    document.getElementById('toDestinationDestination').innerHTML = toDestinationStorage + " - " + fromDestinationStorage;
                }
            }
        });
        setIndexCart();
        $("#loginsso").click(function () {
            signIn();
        });

        $("#logout").click(function () {
            signOut();
        });

        function resetLocalStorage() {
            localStorage.removeItem("userFlightTime");
            localStorage.removeItem("toDestination");
            localStorage.removeItem("fromDestination");
            localStorage.removeItem("userFlightDate");
            localStorage.removeItem("totalPrice");
            localStorage.removeItem("userFlightCost");
            localStorage.removeItem("FlightBooked");
            localStorage.removeItem("adultPassengers");
            localStorage.removeItem("tripInfromation");
            localStorage.removeItem("childrenPassengers");
        }
    </script>
